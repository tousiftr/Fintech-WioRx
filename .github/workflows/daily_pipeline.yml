name: Realtime Fintech Pipeline

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      # Cloudflare R2
      MINIO_ENDPOINT:     ${{ secrets.S3_ENDPOINT }}
      MINIO_ROOT_USER:    ${{ secrets.S3_ACCESS_KEY }}
      MINIO_ROOT_PASSWORD: ${{ secrets.S3_SECRET_KEY }}
      MINIO_BUCKET:       ${{ secrets.S3_BUCKET }}
      # Neon Postgres
      DATABASE_URL: postgresql://${{ secrets.PG_USER }}:${{ secrets.PG_PASSWORD }}@${{ secrets.PG_HOST }}/${{ secrets.PG_DB }}?sslmode=require
      PG_HOST:     ${{ secrets.PG_HOST }}
      PG_DB:       ${{ secrets.PG_DB }}
      PG_USER:     ${{ secrets.PG_USER }}
      PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
      PG_SCHEMA:   analytics
      PG_THREADS:  "4"
      DBT_ENV:     dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: generator/requirements.txt

      - name: Install generator dependencies
        run: pip install -r generator/requirements.txt

      # Unique batch ID for this run — used as S3 partition and loader key
      - name: Set RUN_BATCH
        run: echo "RUN_BATCH=$(date -u +%Y%m%d_%H%M%S)" >> $GITHUB_ENV

      # ── Step 1: Generate data → upload to R2 ──────────────────────────────
      - name: Generate incremental data and upload to R2
        working-directory: generator
        run: python main.py

      # ── Step 2: Load from R2 → Neon Postgres ──────────────────────────────
      - name: Load batch from R2 into Postgres raw tables
        working-directory: generator
        run: python load_to_postgres.py

      # ── Step 3: dbt staging refresh ───────────────────────────────────────
      - name: Install dbt
        run: pip install dbt-postgres==1.9.0

      - name: dbt staging models
        working-directory: dbt
        run: dbt run --select staging --profiles-dir profiles
