name: Realtime Data Pipeline

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Write .env files from GitHub Secrets ──────────────────────────────
      - name: Create root .env
        run: |
          cat > .env << ENV
          AIRFLOW_UID=50000
          MINIO_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          MINIO_ROOT_USER=${{ secrets.S3_ACCESS_KEY }}
          MINIO_ROOT_PASSWORD=${{ secrets.S3_SECRET_KEY }}
          MINIO_BUCKET=${{ secrets.S3_BUCKET }}
          ENV

      - name: Create dbt/.env (Neon cloud Postgres)
        run: |
          cat > dbt/.env << ENV
          DBT_ENV=dev
          PG_HOST=${{ secrets.PG_HOST }}
          PG_PORT=5432
          PG_DB=${{ secrets.PG_DB }}
          PG_SCHEMA=analytics
          PG_USER=${{ secrets.PG_USER }}
          PG_PASSWORD=${{ secrets.PG_PASSWORD }}
          PG_THREADS=4
          ENV

      # ── Build images ───────────────────────────────────────────────────────
      - name: Build generator image
        run: docker compose build generator

      # ── Run pipeline ───────────────────────────────────────────────────────
      - name: Generate data and upload to R2
        run: docker compose run --rm generator python main.py

      - name: Load from R2 into Neon Postgres
        run: |
          docker compose run --rm \
            -e DATABASE_URL=postgresql://${{ secrets.PG_USER }}:${{ secrets.PG_PASSWORD }}@${{ secrets.PG_HOST }}/${{ secrets.PG_DB }}?sslmode=require \
            generator python load_to_postgres.py

      - name: Build dbt image
        run: docker compose build dbt

      - name: dbt — staging models
        run: docker compose run --rm dbt dbt run --select staging

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Tear down
        if: always()
        run: docker compose down -v
